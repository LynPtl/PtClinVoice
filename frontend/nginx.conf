server {
    listen 80;
    server_name localhost;

    # SRE Tune: Support large medical audio uploads up to 50MB
    client_max_body_size 50M;

    # Serve static assets from the Vite build directory
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        # React Router fallback mechanism for Single Page Applications (SPA)
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy for the FastAPI backend
    location /api/ {
        # 'ptclinvoice-api' is the Docker Compose service name for the backend
        proxy_pass http://ptclinvoice-api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Support Server-Sent Events (SSE) stream connections
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_read_timeout 24h;
    }

    # Error pages handling
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
